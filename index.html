<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary - Ingia</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* ============================================
           ROOT VARIABLES
           ============================================ */
        :root {
            --bg-body: #0a0a1a;
            --bg-container: rgba(255,255,255,0.05);
            --bg-section: rgba(255,255,255,0.03);
            --bg-card: rgba(255,255,255,0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-light: rgba(255,255,255,0.4);
            --border-color: rgba(255,255,255,0.1);
            --shadow: 0 30px 80px rgba(0,0,0,0.6);
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --btn-primary: #667eea;
            --btn-success: #28a745;
            --btn-danger: #dc3545;
            --transition: all 0.3s ease;
            --status-pending: #ffc107;
            --status-completed: #28a745;
            --status-rejected: #dc3545;
        }
        
        /* ============================================
           GLOBAL STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(240, 147, 251, 0.08) 0%, transparent 50%);
            animation: rotateBg 30s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ============================================
           PARTICLES
           ============================================ */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* ============================================
           APP WRAPPER
           ============================================ */
        .app-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* ============================================
           NAVBAR
           ============================================ */
        .navbar {
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: var(--transition);
            display: none;
        }
        
        .navbar.visible {
            display: flex;
        }
        
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar-brand h2 {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5em;
        }
        
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gradient-start);
        }
        
        .user-name-display {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .btn-logout {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: var(--btn-danger);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
        
        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .container {
            background: var(--bg-container);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 45px 40px 35px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: slideUp 0.8s ease;
            transition: var(--transition);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        
        /* ============================================
           HEADER
           ============================================ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 8px;
            animation: pulseIcon 3s ease-in-out infinite;
        }
        
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .header h1 {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        /* ============================================
           AUTH SECTION
           ============================================ */
        #authSection {
            display: block;
        }
        
        #authSection.hidden {
            display: none;
        }
        
        /* ============================================
           TABS
           ============================================ */
        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: var(--transition);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        
        .tab-btn:hover:not(.active) {
            color: var(--text-secondary);
        }
        
        /* ============================================
           FORMS
           ============================================ */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: white;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }
        
        .form-group input:focus {
            border-color: var(--gradient-start);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.08);
        }
        
        .form-group input::placeholder {
            color: var(--text-light);
        }
        
        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(102, 126, 234, 0.5);
        }
        
        .btn-google {
            background: rgba(255,255,255,0.06);
            color: white;
            border: 2px solid rgba(255,255,255,0.08);
        }
        
        .btn-google:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }
        
        .btn-google svg {
            width: 20px;
            height: 20px;
        }
        
        .btn-success {
            background: var(--btn-success);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        
        .btn-danger {
            background: var(--btn-danger);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
        
        /* ============================================
           DIVIDER
           ============================================ */
        .divider {
            display: flex;
            align-items: center;
            margin: 22px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .divider-text {
            color: var(--text-light);
            font-size: 11px;
            padding: 0 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
        
        /* ============================================
           DASHBOARD CONTENT (After Login)
           ============================================ */
        #dashboardContent {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        #dashboardContent.visible {
            display: block;
        }
        
        .welcome-banner {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #51cf66;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--bg-section);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        
        .controls-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .controls-group label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .controls-group select,
        .controls-group button {
            padding: 8px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-container);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .controls-group select:hover,
        .controls-group button:hover {
            border-color: var(--btn-primary);
        }
        
        .theme-btn {
            padding: 8px 12px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: var(--bg-container);
        }
        
        .theme-btn:hover {
            transform: scale(1.1);
            border-color: var(--btn-primary);
        }
        
        .theme-btn.active {
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 2px var(--btn-primary);
        }
        
        /* ============================================
           ORDER FORM
           ============================================ */
        .form-section {
            background: var(--bg-section);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-section h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg-container);
            color: var(--text-primary);
            transition: var(--transition);
            resize: vertical;
            min-height: 100px;
            outline: none;
        }
        
        .form-group textarea:focus {
            border-color: var(--gradient-start);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.08);
        }
        
        .form-group textarea::placeholder {
            color: var(--text-light);
        }
        
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg-container);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }
        
        .form-group select:focus {
            border-color: var(--gradient-start);
        }
        
        /* ============================================
           ORDERS LIST
           ============================================ */
        .pending-orders {
            margin-top: 30px;
        }
        
        .pending-orders h2 {
            color: var(--text-primary);
            border-bottom: 3px solid var(--gradient-start);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .pending-orders .subtitle {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .order-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: var(--transition);
        }
        
        .order-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        
        .order-card.completed {
            border-color: var(--status-completed);
        }
        
        .order-card.pending {
            border-color: var(--status-pending);
        }
        
        .order-card.rejected {
            border-color: var(--status-rejected);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .order-title {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .order-status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-pending {
            background: var(--status-pending);
            color: #333;
        }
        
        .status-completed {
            background: var(--status-completed);
            color: white;
        }
        
        .status-rejected {
            background: var(--status-rejected);
            color: white;
        }
        
        .order-details {
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .order-details p {
            margin: 4px 0;
        }
        
        .order-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .script-link {
            display: inline-block;
            background: var(--btn-success);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 8px;
            transition: var(--transition);
        }
        
        .script-link:hover {
            opacity: 0.8;
        }
        
        .no-orders {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-size: 1.1em;
        }
        
        /* ============================================
           MESSAGES
           ============================================ */
        .success-message {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #51cf66;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.visible {
            display: block;
        }
        
        .message {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        
        .message.active {
            display: block;
        }
        
        .message.error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
        }
        
        .message.success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #51cf66;
        }
        
        .message.info {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: #8898f5;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.06);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================
           AUDIO PLAYER
           ============================================ */
        .audio-player {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .audio-player audio {
            width: 100%;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
        }
        
        .audio-player audio::-webkit-media-controls-panel {
            background: rgba(255,255,255,0.05);
        }
        
        .audio-player audio::-webkit-media-controls-current-time-display,
        .audio-player audio::-webkit-media-controls-time-remaining-display {
            color: var(--text-secondary);
        }
        
        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-light);
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .footer span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }
        
        .footer a {
            color: var(--btn-primary);
            text-decoration: none;
        }
        
        .footer .contact-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .navbar {
                flex-direction: column;
                text-align: center;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 32px;
            }
            
            .tab-btn {
                font-size: 13px;
                padding: 10px;
            }
            
            .btn {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>
    
    <div class="app-wrapper">
        <!-- ==========================================
        NAVBAR (After Login)
        ========================================== -->
        <nav class="navbar" id="navbar">
            <div class="navbar-brand">
                <h2>🚀 Dvary</h2>
            </div>
            <div class="navbar-user" id="navbarUser">
                <!-- Populated by JS -->
            </div>
        </nav>
        
        <!-- ==========================================
        MAIN CONTAINER
        ========================================== -->
        <div class="container" id="mainContainer">
            
            <!-- ==========================================
            AUTH SECTION (Login/Signup)
            ========================================== -->
            <div id="authSection">
                <div class="header">
                    <span class="icon">🚀</span>
                    <h1>Dvary</h1>
                    <p>Ingia kwa kutumia akaunti yako</p>
                </div>
                
                <!-- Tabs -->
                <div class="tab-container">
                    <button class="tab-btn active" data-tab="login">🔑 Ingia</button>
                    <button class="tab-btn" data-tab="signup">📝 Jiandikisha</button>
                </div>
                
                <!-- Login Form -->
                <div id="loginForm" class="tab-content active">
                    <form id="loginFormElement">
                        <div class="form-group">
                            <label>📧 Barua pepe</label>
                            <input type="email" id="loginEmail" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>🔒 Nenosiri</label>
                            <input type="password" id="loginPassword" placeholder="Nenosiri lako" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">🔑 Ingia</button>
                    </form>
                </div>
                
                <!-- Signup Form -->
                <div id="signupForm" class="tab-content">
                    <form id="signupFormElement">

        // ============================================

        function showSuccess(text) {

            setTimeout(() => {

        function clearForms() {
            loginEmail.value = '';

            signupName.value = '';

        // ============================================

                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(tab + 'Form').classList.add('active');
                message.classList.remove('active');
            });

        // ============================================

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
            localStorage.setItem('dvary-theme', theme);
        }
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => setTheme(btn.dataset.theme));
        });
        
        // ============================================
        // LANGUAGE
        // ============================================
        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('labelName').textContent = t.labelName;
            document.getElementById('labelEmail').textContent = t.labelEmail;
            document.getElementById('labelAppType').textContent = t.labelAppType;
            document.getElementById('labelDescription').textContent = t.labelDescription;
            document.getElementById('labelFeatures').textContent = t.labelFeatures;
            document.getElementById('labelPlatform').textContent = t.labelPlatform;
            document.getElementById('submitText').textContent = t.submitText;
            document.getElementById('pendingTitle').textContent = t.pendingTitle;
            document.getElementById('pendingSubtitle').textContent = t.pendingSubtitle;
            
            // Update placeholders
            customerName.placeholder = lang === 'sw' ? 'Mfano: Juma Mwinyi' : 'Example: John Doe';
            customerEmail.placeholder = lang === 'sw' ? 'Mfano: juma@gmail.com' : 'Example: john@gmail.com';
            appType.placeholder = lang === 'sw' ? 'Mfano: Biashara, Elimu, Social Media...' : 'Example: Business, Education, Social Media...';
            description.placeholder = lang === 'sw' ? 'Eleza vizuri app unayotaka...' : 'Describe your app in detail...';
            features.placeholder = lang === 'sw' ? 'Login, Cart, Payment' : 'Login, Cart, Payment';
            
            // Update platform options
            const opts = platform.options;
            if (lang === 'sw') {
                opts[0].text = '📱 Android';
                opts[1].text = '🍎 iOS';
                opts[2].text = '🌐 Web';
                opts[3].text = '💻 Desktop';
                opts[4].text = '📱📱 Cross-platform';

                opts[0].text = '📱 Android';
                opts[1].text = '🍎 iOS';
                opts[2].text = '🌐 Web';
                opts[3].text = '💻 Desktop';
                opts[4].text = '📱📱 Cross-platform';
            }
            
            loadOrders();
        }
        
        document.getElementById('langSelect').addEventListener('change', (e) => {
            setLanguage(e.target.value);
            localStorage.setItem('dvary-lang', e.target.value);
        });
        
        // ============================================
        // NAVBAR
        // ============================================
        function updateNavbar() {
            const t = translations[currentLang];
            if (currentUser) {
                const photo = currentUser.photoURL || 
                    'https://ui-avatars.com/api/?name=' + 
                    encodeURIComponent(currentUser.displayName || 'User') + 
                    '&background=667eea&color=fff&size=40';
                const name = currentUser.displayName || currentUser.email || 'User';
                navbarUser.innerHTML = `
                    <img src="${photo}" alt="Avatar" class="user-avatar-small">
                    <span class="user-name-display">${name}</span>
                    <button class="btn-logout" onclick="handleLogout()">${t.logout}</button>
                `;
            }
        }
        
        // ============================================
        // AUTH HANDLERS
        // ============================================
        function handleLogout() {
            auth.signOut().then(() => {
                currentUser = null;
                updateUI();
            });
        }
        
        // ============================================
        // UPDATE UI
        // ============================================
        function updateUI() {
            if (currentUser) {
                authSection.style.display = 'none';
                dashboardContent.classList.add('visible');
                navbar.classList.add('visible');
                updateNavbar();
                const name = currentUser.displayName || currentUser.email || 'User';
                welcomeBanner.textContent = `✅ ${currentLang === 'sw' ? 'Karibu' : 'Welcome'} ${name}! ${currentLang === 'sw' ? 'Umefanikiwa kuingia.' : 'You have successfully logged in.'}`;
                loadOrders();
            } else {
                authSection.style.display = 'block';
                dashboardContent.classList.remove('visible');
                navbar.classList.remove('visible');
            }
        }
        
        // ============================================
        // SIGN UP
        // ============================================
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;
            const confirm = signupConfirm.value;
            
            if (!name || !email || !password || !confirm) {
                showMessage('Tafadhali jaza sehemu zote', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('Nenosiri hazifanani!', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('Nenosiri lazima liwe na angalau herufi 6', 'error');
                return;
            }
            
            showLoading();
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                hideLoading();
                showMessage('✅ Akaunti imeundwa!', 'success');
                clearForms();
            } catch (error) {
                hideLoading();
                let msg = 'Kosa: ';
                switch (error.code) {
                    case 'auth/email-already-in-use': msg += 'Barua pepe hii tayari inatumika.'; break;
                    case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
                    case 'auth/weak-password': msg += 'Nenosiri ni dhaifu.'; break;
                    default: msg += error.message;
                }
                showMessage(msg, 'error');
            }
        });
        
        // ============================================
        // LOGIN
        // ============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            
            if (!email || !password) {
                showMessage('Tafadhali jaza barua pepe na nenosiri', 'error');
                return;
            }
            
            showLoading();
            try {
                await auth.signInWithEmailAndPassword(email, password);
                hideLoading();
                showMessage('✅ Umefanikiwa kuingia!', 'success');
                clearForms();
            } catch (error) {
                hideLoading();
                let msg = 'Kosa: ';
                switch (error.code) {
                    case 'auth/user-not-found': msg += 'Akaunti haipatikani. Jiandikisha kwanza.'; break;
                    case 'auth/wrong-password': msg += 'Nenosiri si sahihi.'; break;
                    case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
                    case 'auth/too-many-requests': msg += 'Majaribio mengi sana. Jaribu tena baadaye.'; break;
                    default: msg += error.message;
                }
                showMessage(msg, 'error');
            }
        });
        
        // ============================================
        // GOOGLE SIGN IN
        // ============================================
        signInBtn.addEventListener('click', async () => {
            showLoading();
            try {
                await auth.signInWithPopup(googleProvider);
                hideLoading();
                showMessage('✅ Umefanikiwa kuingia na Google!', 'success');
            } catch (error) {
                hideLoading();
                if (error.code === 'auth/popup-blocked') {
                    showMessage('⚠️ Ruhusu popups kwenye browser yako.', 'error');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Umeghairi kuingia.', 'info');
                } else if (error.code !== 'auth/cancelled-popup-request') {
                    showMessage('Kosa: ' + error.message, 'error');
                }
            }
        });
        
        // ============================================
        // LOAD ORDERS
        // ============================================
        function loadOrders() {
            if (!currentUser) return;
            const t = translations[currentLang];
            
            db.collection('orders')
                .orderBy('dateSubmitted', 'desc')
                .onSnapshot((snapshot) => {
                    let html = '';
                    if (snapshot.empty) {
                        html = `<div class="no-orders">${t.noOrders}</div>`;
                    } else {
                        snapshot.forEach((doc) => {
                            const order = doc.data();
                            const id = doc.id;
                            let statusClass = 'pending';
                            let statusText = t.statusPending;
                            if (order.status === 'completed') {
                                statusClass = 'completed';
                                statusText = t.statusCompleted;
                            } else if (order.status === 'rejected') {
                                statusClass = 'rejected';
                                statusText = t.statusRejected;
                            }
                            
                            const date = order.dateSubmitted 
                                ? new Date(order.dateSubmitted.seconds * 1000).toLocaleDateString(
                                    currentLang === 'sw' ? 'sw-TZ' : 'en-US',
                                    { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }
                                  )
                                : '...';
                            
                            html += `
                                <div class="order-card ${statusClass}">
                                    <div class="order-header">
                                        <div>
                                            <span class="order-title">${order.appType || 'App'}</span>
                                            <span class="order-status status-${order.status || 'pending'}">${statusText}</span>
                                        </div>
                                        <div style="font-size: 0.85em; color: var(--text-light);">${date}</div>
                                    </div>
                                    <div class="order-details">
                                        <p><strong>👤 ${currentLang === 'sw' ? 'Jina' : 'Name'}:</strong> ${order.customerName || '...'}</p>
                                        <p><strong>📧 Email:</strong> ${order.customerEmail || '...'}</p>
                                        <p><strong>📝 ${currentLang === 'sw' ? 'Maelezo' : 'Description'}:</strong> ${order.description || '...'}</p>
                                        ${order.features ? `<p><strong>⚙️ ${currentLang === 'sw' ? 'Vipengele' : 'Features'}:</strong> ${Array.isArray(order.features) ? order.features.join(', ') : order.features}</p>` : ''}
                                        <p><strong>💻 ${currentLang === 'sw' ? 'Platform' : 'Platform'}:</strong> ${order.platform || '...'}</p>
                                        ${order.scriptUrl ? `<p><strong>🔗 ${currentLang === 'sw' ? 'Script' : 'Script'}:</strong> <a href="${order.scriptUrl}" target="_blank" class="script-link">${t.scriptLink}</a></p>` : ''}
                                    </div>
                                    ${order.status === 'pending' ? `
                                        <div class="order-actions">
                                            <button class="btn btn-success" onclick="completeOrder('${id}')">${t.completeBtn}</button>
                                            <button class="btn btn-danger" onclick="rejectOrder('${id}')">${t.rejectBtn}</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                    }
                    ordersList.innerHTML = html;
                });
        }
        
        // ============================================
        // ORDER ACTIONS
        // ============================================
        function completeOrder(id) {
            const t = translations[currentLang];
            const url = prompt(t.scriptPrompt);
            if (url) {
                db.collection('orders').doc(id).update({
                    status: 'completed',
                    scriptUrl: url,
                    dateCompleted: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => alert(t.alertComplete))
                  .catch((e) => alert(t.alertError + e.message));
            }
        }
        
        function rejectOrder(id) {
            const t = translations[currentLang];
            if (confirm(t.confirmReject)) {
                db.collection('orders').doc(id).update({
                    status: 'rejected'
                }).then(() => alert(t.alertReject))
                  .catch((e) => alert(t.alertError + e.message));
            }
        }
        
        // ============================================
        // SUBMIT ORDER
        // ============================================
        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const t = translations[currentLang];
            
            const name = customerName.value.trim();
            const email = customerEmail.value.trim();
            const type = appType.value.trim();
            const desc = description.value.trim();
            const feat = features.value.trim();
            const plat = platform.value;
            
            if (!name || !email || !type || !desc) {
                alert(t.alertRequired);
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                alert(t.alertEmail);
                return;
            }
            
            const featuresArr = feat ? feat.split(',').map(f => f.trim()).filter(f => f) : [];
            
            submitBtn.disabled = true;
            submitText.textContent = t.submitLoading;
            
            try {
                await db.collection('orders').add({
                    customerName: name,
                    customerEmail: email,
                    appType: type,
                    description: desc,
                    features: featuresArr,
                    platform: plat,
                    status: 'pending',
                    scriptUrl: '',
                    dateSubmitted: firebase.firestore.FieldValue.serverTimestamp(),
                    submittedBy: currentUser.email
                });
                showSuccess('Order imetumwa!');
                orderForm.reset();
            } catch (error) {
                alert(t.alertError + error.message);
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = t.submitText;
            }
        });
        
        // ============================================
        // AUTH STATE LISTENER
        // ============================================
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            updateUI();
            if (user) {
                console.log('✅ Mtumiaji ameingia:', user.email);
            } else {
                console.log('🔴 Mtumiaji ametoka');
            }
        });
        
        // ============================================
        // INIT
        // ============================================
        const savedTheme = localStorage.getItem('dvary-theme') || 'light';
        const savedLang = localStorage.getItem('dvary-lang') || 'sw';
        setTheme(savedTheme);
        document.getElementById('langSelect').value = savedLang;
        setLanguage(savedLang);
        
        console.log('🚀 Dvary - Imepakiwa!');
    </script>
</body>
                              </html>
