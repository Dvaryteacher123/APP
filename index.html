<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DvaryApp Login</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="dashboard" style="display:none;">
        <h1>Karibu kwenye Dashibodi</h1>
        <p id="userEmail"></p>
        <button onclick="logout()">Toka (Logout)</button>
    </div>

    <div id="login-box">
        <h1>DvaryApp Login</h1>
        <button id="google-login">Sign in with Google</button>
    </div>

    <script>
        // Configuration yako (Kutoka google-services.json)
        const firebaseConfig = {
            apiKey: "AIzaSyDPFyANpjv2dMUvXoMSSmqoT3s1UwJLUKg",
            authDomain: "dvary-9a7d0.firebaseapp.com",
            projectId: "dvary-9a7d0",
            storageBucket: "dvary-9a7d0.firebasestorage.app",
            messagingSenderId: "1073708066",
            appId: "1:1073708066:android:e954fb03d99e52ac09f52b"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();

        // Google Sign-in Logic
        document.getElementById('google-login').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    alert("Umeingia kwa mafanikio!");
                })
                .catch((error) => {
                    alert("Kuna tatizo: " + error.message);
                });
        });

        // Kufuatilia kama mtumiaji ameingia (Dashboard Logic)
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('userEmail').innerText = "Mtumiaji: " + user.email;
            }
        });

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
