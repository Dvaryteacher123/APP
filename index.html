<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary - Ingia</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #0c0c1d);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* ===== RAIN BACKGROUND ===== */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.4));
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-20px) rotate(15deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(15deg);
                opacity: 0.2;
            }
        }

        /* ===== LIGHTNING FLASH ===== */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: lightningFlash 8s infinite;
        }

        @keyframes lightningFlash {
            0%, 90%, 94%, 96%, 100% { opacity: 0; }
            92% { opacity: 0.6; }
            95% { opacity: 0.3; }
            97% { opacity: 0.5; }
        }

        /* ===== GLASS CONTAINER ===== */
        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            padding: 45px 40px 35px;
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        .header h1 {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ===== TABS ===== */
        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ===== FORMS ===== */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
        }

        .btn-signout {
            background: rgba(220, 53, 69, 0.7);
            color: white;
        }

        .btn-signout:hover {
            background: #dc3545;
            transform: translateY(-2px);
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 22px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .divider-text {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            padding: 0 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== USER INFO ===== */
        .user-info {
            display: none;
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 14px;
            border: 3px solid #667eea;
            box-shadow: 0 5px 25px rgba(102, 126, 234, 0.3);
        }

        .user-name {
            font-size: 19px;
            font-weight: 700;
            color: white;
        }

        .user-email {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin: 4px 0 16px 0;
        }

        .user-info .btn {
            max-width: 200px;
            margin: 0 auto;
        }

        /* ===== LOADING ===== */
        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== MESSAGE ===== */
        .message {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        .message.active {
            display: block;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #51cf66;
        }

        .message.info {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: #8898f5;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
        }

        .footer span {
            color: rgba(255, 255, 255, 0.2);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px 25px;
            }

            .header h1 {
                font-size: 30px;
            }

            .header-icon {
                font-size: 38px;
            }

            .tab-btn {
                font-size: 13px;
                padding: 9px;
            }

            .btn {
                font-size: 14px;
                padding: 12px;
            }

            .user-avatar {
                width: 65px;
                height: 65px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== RAIN BACKGROUND ===== -->
    <div class="rain-container" id="rainContainer"></div>
    <div class="lightning"></div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="container">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <span class="header-icon">🌧️</span>
            <h1>Dvary</h1>
            <p>Ingia kwa kutumia akaunti yako</p>
        </div>

        <!-- ===== USER INFO (when logged in) ===== -->
        <div id="userInfo" class="user-info">
            <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
            <div class="user-name" id="userName">Mtumiaji</div>
            <div class="user-email" id="userEmail">email@example.com</div>
            <button id="signOutBtn" class="btn btn-signout">🚪 Toka</button>
        </div>

        <!-- ===== AUTH SECTION (when logged out) ===== -->
        <div id="authSection">

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" data-tab="login">🔑 Ingia</button>
                <button class="tab-btn" data-tab="signup">📝 Jiandikisha</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <div id="loginForm" class="tab-content active">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label>📧 Barua pepe</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Nenosiri</label>
                        <input type="password" id="loginPassword" placeholder="Nenosiri lako" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">🔑 Ingia</button>
                </form>
            </div>

            <!-- ===== SIGNUP FORM ===== -->
            <div id="signupForm" class="tab-content">
                <form id="signupFormElement">
                    <div class="form-group">
                        <label>👤 Jina lako</label>
                        <input type="text" id="signupName" placeholder="Jina lako kamili" required>
                    </div>
                    <div class="form-group">
                        <label>📧 Barua pepe</label>
                        <input type="email" id="signupEmail" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Nenosiri</label>
                        <input type="password" id="signupPassword" placeholder="Angalau herufi 6" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>✅ Thibitisha</label>
                        <input type="password" id="signupConfirmPassword" placeholder="Andika nenosiri tena" required>
                    </div>
                    <button type="submit" class="btn btn-primary">📝 Jiandikisha</button>
                </form>
            </div>

            <!-- ===== DIVIDER ===== -->
            <div class="divider">
                <span class="divider-text">Au</span>
            </div>

            <!-- ===== GOOGLE SIGN IN ===== -->
            <button id="signInBtn" class="btn btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Ingia na Google
            </button>
        </div>

        <!-- ===== LOADING ===== -->
        <div id="loading" class="loading">
            <span class="spinner"></span> Inapakia...
        </div>

        <!-- ===== MESSAGE ===== -->
        <div id="message" class="message"></div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">© 2026 <span>Dvary</span> • Haki zote zimehifadhiwa</div>
    </div>

    <script>
        // ============================================================
        // 1. FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDpFyANpjv2dMUvXoMSSmqoT3s1UwJLUkg",
            authDomain: "dvary-9a7d0.firebaseapp.com",
            projectId: "dvary-9a7d0",
            storageBucket: "dvary-9a7d0.firebasestorage.app",
            messagingSenderId: "107370806066",
            appId: "1:107370806066:android:e954fb03d99e52ac09f52b"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ============================================================
        // 2. RAIN ANIMATION
        // ============================================================
        function createRain() {
            const container = document.getElementById('rainContainer');
            const drops = 180;

            for (let i = 0; i < drops; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.height = (Math.random() * 18 + 8) + 'px';
                drop.style.animationDuration = (Math.random() * 0.8 + 0.4) + 's';
                drop.style.animationDelay = (Math.random() * 2.5) + 's';
                drop.style.opacity = Math.random() * 0.5 + 0.15;
                container.appendChild(drop);
            }
        }
        createRain();

        // ============================================================
        // 3. DOM ELEMENTS
        // ============================================================
        const authSection = document.getElementById('authSection');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');
        const signOutBtn = document.getElementById('signOutBtn');
        const signInBtn = document.getElementById('signInBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');

        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const signupConfirmPassword = document.getElementById('signupConfirmPassword');

        const tabBtns = document.querySelectorAll('.tab-btn');

        // ============================================================
        // 4. HELPER FUNCTIONS
        // ============================================================
        function showLoading() {
            loading.classList.add('active');
        }

        function hideLoading() {
            loading.classList.remove('active');
        }

        function showMessage(text, type = 'info') {
            message.textContent = text;
            message.className = 'message active ' + type;
            setTimeout(() => {
                message.classList.remove('active');
            }, 5000);
        }

        function updateUI(user) {
            if (user) {
                userInfo.classList.add('active');
                authSection.style.display = 'none';
                userName.textContent = user.displayName || 'Mtumiaji wa Dvary';
                userEmail.textContent = user.email || 'email@example.com';
                userAvatar.src = user.photoURL || 
                    'https://ui-avatars.com/api/?name=' + 
                    encodeURIComponent(user.displayName || 'Dvary') + 
                    '&background=667eea&color=fff&size=80';
                console.log('✅ Mtumiaji ameingia:', user.email);
            } else {
                userInfo.classList.remove('active');
                authSection.style.display = 'block';
                console.log('👋 Mtumiaji ametoka');
            }
        }

        function clearForms() {
            loginEmail.value = '';
            loginPassword.value = '';
            signupName.value = '';
            signupEmail.value = '';
            signupPassword.value = '';
            signupConfirmPassword.value = '';
        }

        // ============================================================
        // 5. TAB SWITCHING
        // ============================================================
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tab + 'Form').classList.add('active');

                message.classList.remove('active');
            });
        });

        // ============================================================
        // 6. SIGN UP
        // ============================================================
        document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;
            const confirm = signupConfirmPassword.value;

            if (!name || !email || !password || !confirm) {
                showMessage('Tafadhali jaza sehemu zote', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Nenosiri hazifanani!', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Nenosiri lazima liwe na angalau herufi 6', 'error');
                return;
            }

            showLoading();

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                const user = result.user;

                await user.updateProfile({ displayName: name });

                // Send verification email
                await user.sendEmailVerification();

                hideLoading();
                showMessage('✅ Akaunti imeundwa! Thibitisha barua pepe yako.', 'success');
                clearForms();

                // Sign out to require verification
                await auth.signOut();
                updateUI(null);

            } catch (error) {
                hideLoading();
                console.error('Signup error:', error);

                let msg = 'Kosa: ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        msg += 'Barua pepe hii tayari inatumika.';
                        break;
                    case 'auth/invalid-email':
                        msg += 'Barua pepe si sahihi.';
                        break;
                    case 'auth/weak-password':
                        msg += 'Nenosiri ni dhaifu.';
                        break;
                    default:
                        msg += error.message;
                }
                showMessage(msg, 'error');
            }
        });

        // ============================================================
        // 7. LOGIN
        // ============================================================
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                showMessage('Tafadhali jaza barua pepe na nenosiri', 'error');
                return;
            }

            showLoading();

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const user = result.user;

                if (!user.emailVerified) {
                    await auth.signOut();
                    hideLoading();
                    showMessage('⚠️ Thibitisha barua pepe yako kwanza. Angalia spam.', 'error');
                    return;
                }

                hideLoading();
                showMessage('✅ Karibu tena, ' + (user.displayName || user.email) + '!', 'success');
                clearForms();

            } catch (error) {
                hideLoading();
                console.error('Login error:', error);

                let msg = 'Kosa: ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg += 'Akaunti haipatikani. Jiandikisha kwanza.';
                        break;
                    case 'auth/wrong-password':
                        msg += 'Nenosiri si sahihi.';
                        break;
                    case 'auth/invalid-email':
                        msg += 'Barua pepe si sahihi.';
                        break;
                    case 'auth/user-disabled':
                        msg += 'Akaunti imezimwa.';
                        break;
                    default:
                        msg += error.message;
                }
                showMessage(msg, 'error');
            }
        });

        // ============================================================
        // 8. GOOGLE SIGN IN
        // ============================================================
        signInBtn.addEventListener('click', async () => {
            showLoading();

            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;
                hideLoading();
                showMessage('✅ Karibu ' + (user.displayName || user.email) + '!', 'success');
            } catch (error) {
                hideLoading();
                console.error('Google signin error:', error);

                if (error.code === 'auth/popup-blocked') {
                    showMessage('⚠️ Ruhusu popups kwenye browser yako.', 'error');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Umeghairi kuingia. Jaribu tena.', 'info');
                } else if (error.code !== 'auth/cancelled-popup-request') {
                    showMessage('Kosa: ' + error.message, 'error');
                }
            }
        });

        // ============================================================
        // 9. SIGN OUT
        // ============================================================
        signOutBtn.addEventListener('click', async () => {
            showLoading();
            try {
                await auth.signOut();
                hideLoading();
                showMessage('👋 Umefanikiwa kutoka!', 'info');
                clearForms();
            } catch (error) {
                hideLoading();
                showMessage('Kosa: ' + error.message, 'error');
            }
        });

        // ============================================================
        // 10. AUTH STATE LISTENER
        // ============================================================
        auth.onAuthStateChanged((user) => {
            hideLoading();
            updateUI(user);

            if (user) {
                console.log('🟢 Mtumiaji ameingia:', {
                    email: user.email,
                    name: user.displayName,
                    verified: user.emailVerified
                });
            } else {
                console.log('🔴 Mtumiaji ametoka');
            }
        });

        // ============================================================
        // 11. KEYBOARD SHORTCUT
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.tab-content.active');
                if (activeForm) {
                    const btn = activeForm.querySelector('button[type="submit"]');
                    if (btn) btn.click();
                }
            }
        });

        console.log('🌧️ Dvary imeanza!');
        console.log('📡 Firebase imeunganishwa kikamilifu.');
    </script>
</body>
                      </html>
